<!-- Pre-order Book Display -->
<div class="preorder-book">
  <div class="preorder-book__cover">
    <img src="book-cover.jpg" alt="Book Cover" />
  </div>
  <div class="preorder-book__info">
    <h2 class="preorder-book__title">Book Title</h2>
    <div class="preorder-book__themes">
      <h3>Key Issues / Themes</h3>
      <ul>
        <li>Theme 1: Brief description</li>
        <li>Theme 2: Brief description</li>
        <li>Theme 3: Brief description</li>
      </ul>
    </div>
    <div class="preorder-book__cta">
      <button class="btn btn--preorder">Pre-order Now</button>
      <span class="preorder-book__availability">Available for pre-order</span>
    </div>
  </div>
</div>
